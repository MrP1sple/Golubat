<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golubat Chat</title>
    <style>
        :root {
            --bg: #ffffff;
            --bg-secondary: #f5f5f5;
            --text: #333333;
            --text-secondary: #888888;
            --border: #e0e0e0;
            --message-sent: linear-gradient(135deg, #667eea, #764ba2);
            --message-received: #ffffff;
            --header-bg: linear-gradient(135deg, #667eea, #764ba2);
            --input-bg: #ffffff;
            --button-bg: linear-gradient(135deg, #667eea, #764ba2);
            --tab-active: #667eea;
            --tab-inactive: #ccc;
            --card-bg: linear-gradient(135deg, #667eea, #764ba2);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }

        .container {
            width: 100%; max-width: 800px; height: 95vh;
            background: var(--bg); border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* Экраны */
        #loginScreen, #mainScreen, #registerScreen { display: none; }
        #loginScreen.active, #mainScreen.active, #registerScreen.active { display: flex; flex-direction: column; height: 100%; }
        #loginScreen, #registerScreen { justify-content: center; align-items: center; padding: 40px; }

        h1 { color: var(--text); margin-bottom: 10px; font-size: 1.8em; }
        .subtitle { color: var(--text-secondary); margin-bottom: 20px; }

        input {
            width: 100%; max-width: 300px; padding: 15px;
            border: 2px solid var(--border); border-radius: 50px;
            font-size: 1em; outline: none; margin-bottom: 10px;
            background: var(--input-bg); color: var(--text);
        }
        input:focus { border-color: #667eea; }

        button {
            width: 100%; max-width: 300px; padding: 15px;
            border: none; background: var(--button-bg); color: white;
            font-size: 1em; border-radius: 50px; cursor: pointer;
            font-weight: bold; margin-bottom: 8px;
        }
        button:hover { opacity: 0.9; }
        button.secondary {
            background: transparent; border: 2px solid var(--border); color: var(--text);
        }

        .error-msg { color: #f44336; font-size: 0.85em; margin-bottom: 10px; display: none; }
        .success-msg { color: #4caf50; font-size: 0.85em; margin-bottom: 10px; display: none; }

        /* Шапка */
        .top-bar {
            background: var(--header-bg); color: white;
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .top-bar button {
            background: rgba(255,255,255,0.2); border: none; color: white;
            padding: 8px 16px; border-radius: 20px; cursor: pointer; width: auto; margin: 0 0 0 10px;
        }

        /* Вкладки */
        .tabs { display: flex; border-bottom: 2px solid var(--border); }
        .tab {
            flex: 1; padding: 15px; text-align: center; cursor: pointer;
            font-weight: bold; color: var(--tab-inactive); border-bottom: 3px solid transparent;
        }
        .tab.active { color: var(--tab-active); border-bottom-color: var(--tab-active); }

        .tab-content { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .tab-content.active { display: flex; }

        /* Чат */
        .messages {
            flex: 1; overflow-y: auto; padding: 20px;
            background: var(--bg-secondary); display: flex; flex-direction: column; gap: 10px;
        }
        .message {
            max-width: 70%; padding: 12px 18px; border-radius: 20px;
            word-wrap: break-word; animation: pop 0.3s;
        }
        @keyframes pop {
            from { opacity: 0; transform: scale(0.8) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .message.sent { align-self: flex-end; background: var(--message-sent); color: white; border-bottom-right-radius: 5px; }
        .message.received { align-self: flex-start; background: var(--message-received); color: var(--text); border-bottom-left-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .message .sender { font-size: 0.8em; font-weight: bold; margin-bottom: 3px; }
        .message .time { font-size: 0.7em; opacity: 0.7; text-align: right; margin-top: 5px; }

        .input-area { display: flex; padding: 15px; gap: 10px; border-top: 1px solid var(--border); }
        .input-area input { flex: 1; margin: 0; }
        .input-area button { width: auto; margin: 0; padding: 12px 24px; }

        /* Банк */
        .bank-container { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg-secondary); }
        .balance-card {
            background: var(--card-bg); color: white; padding: 30px;
            border-radius: 20px; margin-bottom: 20px; text-align: center;
        }
        .balance-card .amount { font-size: 3em; font-weight: bold; }
        .transfer-section {
            background: var(--bg); padding: 20px; border-radius: 15px;
        }
        .transfer-section input { max-width: 100%; margin-bottom: 15px; }
        .transfer-section button { max-width: 100%; }

        /* Админ */
        .admin-panel {
            background: #1a1a1a; border: 2px solid #ff0000; padding: 20px;
            border-radius: 15px; margin-bottom: 20px; color: white; display: none;
        }
        .admin-panel button {
            background: rgba(255,0,0,0.2); border: 1px solid #ff0000;
            color: white; width: auto; margin: 5px; font-size: 0.9em;
        }

        /* Уведомления */
        .notification {
            position: fixed; top: 20px; right: 20px; background: #4caf50;
            color: white; padding: 15px 25px; border-radius: 10px; z-index: 9999;
        }

        @media (max-width: 500px) {
            .container { height: 100vh; max-width: 100%; border-radius: 0; }
            .message { max-width: 85%; }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Вход -->
        <div id="loginScreen" class="active">
            <h1>🚀 Golubat Chat</h1>
            <p class="subtitle">Войдите или зарегистрируйтесь</p>
            <input type="text" id="loginNickname" placeholder="Никнейм" maxlength="20" autocomplete="off">
            <input type="password" id="loginPassword" placeholder="Пароль" maxlength="20" autocomplete="off">
            <div class="error-msg" id="loginError"></div>
            <button onclick="login()">Войти 🔑</button>
            <button class="secondary" onclick="showRegister()">Создать аккаунт ✨</button>
        </div>

        <!-- Регистрация -->
        <div id="registerScreen">
            <h1>✨ Регистрация</h1>
            <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;justify-content:center;" id="avatarSel">
                <span style="font-size:2em;cursor:pointer;padding:5px;" data-avatar="😎" class="ava selected">😎</span>
                <span style="font-size:2em;cursor:pointer;padding:5px;" data-avatar="🦊" class="ava">🦊</span>
                <span style="font-size:2em;cursor:pointer;padding:5px;" data-avatar="🐱" class="ava">🐱</span>
                <span style="font-size:2em;cursor:pointer;padding:5px;" data-avatar="🐶" class="ava">🐶</span>
                <span style="font-size:2em;cursor:pointer;padding:5px;" data-avatar="🦁" class="ava">🦁</span>
                <span style="font-size:2em;cursor:pointer;padding:5px;" data-avatar="🐼" class="ava">🐼</span>
            </div>
            <input type="text" id="regNickname" placeholder="Никнейм" maxlength="20" autocomplete="off">
            <input type="password" id="regPassword" placeholder="Пароль (мин. 5 цифр)" maxlength="20" autocomplete="off">
            <input type="password" id="regPasswordConfirm" placeholder="Повторите пароль" maxlength="20" autocomplete="off">
            <div class="error-msg" id="regError"></div>
            <div class="success-msg" id="regSuccess"></div>
            <button onclick="register()">Зарегистрироваться 🎉</button>
            <button class="secondary" onclick="showLogin()">Назад ко входу</button>
        </div>

        <!-- Чат -->
        <div id="mainScreen">
            <div class="top-bar">
                <span><b id="userNickname">User</b></span>
                <div>
                    <button onclick="logout()">Выйти</button>
                </div>
            </div>
            <div class="tabs">
                <div class="tab active" data-tab="chat" onclick="switchTab('chat')">💬 Чат</div>
                <div class="tab" data-tab="bank" onclick="switchTab('bank')">🏦 Банк</div>
            </div>
            <div class="tab-content active" id="chatContent">
                <div class="messages" id="messagesContainer"></div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Сообщение..." maxlength="500" onkeypress="if(event.key==='Enter')sendMessage()" autocomplete="off">
                    <button onclick="sendMessage()">Отправить</button>
                </div>
            </div>
            <div class="tab-content" id="bankContent">
                <div class="bank-container">
                    <div class="balance-card">
                        <p>💰 Ваш баланс</p>
                        <div class="amount" id="balanceDisplay">500 ⭐</div>
                        <p id="infiniteBadge" style="display:none;">♾️ Бесконечный</p>
                    </div>
                    <div class="admin-panel" id="adminPanel">
                        <h3>🔧 Админ панель</h3>
                        <button onclick="resetBalances()">Сброс балансов</button>
                        <button onclick="announce()">Объявление</button>
                        <button onclick="giveBonus()">Бонус 100⭐ всем</button>
                    </div>
                    <div class="transfer-section">
                        <h3>📤 Перевод</h3>
                        <input type="text" id="transferRecipient" placeholder="Кому (никнейм)" autocomplete="off">
                        <input type="number" id="transferAmount" placeholder="Сумма" min="1">
                        <div class="error-msg" id="transferError"></div>
                        <div class="success-msg" id="transferSuccess"></div>
                        <button onclick="makeTransfer()">Отправить 💸</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ========== SUPABASE ==========
        var SUPABASE_URL = 'https://nlrrunpqewtcealfslf.supabase.co';
        var SUPABASE_KEY = 'sb_publishable_aNX07I3_LNzNRx9PoRYSIQ_hYw0Jrd6';
        var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ========== НАСТРОЙКИ ==========
        var ADMIN_NICK = 'MrP1sple';
        var ADMIN_PASS = 'admin12345';
        var currentUser = null;
        var currentAvatar = '😎';
        var isAdmin = false;
        var accounts = {};
        var balances = {};

        // ========== ЭКРАНЫ ==========
        function showRegister() {
            document.getElementById('loginScreen').classList.remove('active');
            document.getElementById('registerScreen').classList.add('active');
        }
        function showLogin() {
            document.getElementById('registerScreen').classList.remove('active');
            document.getElementById('mainScreen').classList.remove('active');
            document.getElementById('loginScreen').classList.add('active');
        }
        function showMain() {
            document.getElementById('loginScreen').classList.remove('active');
            document.getElementById('registerScreen').classList.remove('active');
            document.getElementById('mainScreen').classList.add('active');
            document.getElementById('userNickname').textContent = currentUser;
            document.getElementById('adminPanel').style.display = isAdmin ? 'block' : 'none';
            document.getElementById('infiniteBadge').style.display = isAdmin ? 'block' : 'none';
            updateBalance();
            loadMessages();
            setupRealtime();
        }
        function switchTab(t) {
            document.querySelectorAll('.tab').forEach(function(tb){ tb.classList.remove('active'); });
            document.querySelectorAll('.tab-content').forEach(function(c){ c.classList.remove('active'); });
            document.querySelector('[data-tab="'+t+'"]').classList.add('active');
            document.getElementById(t+'Content').classList.add('active');
            if(t==='bank') updateBalance();
        }

        // ========== РЕГИСТРАЦИЯ ==========
        function register() {
            var nick = document.getElementById('regNickname').value.trim();
            var pass = document.getElementById('regPassword').value;
            var pass2 = document.getElementById('regPasswordConfirm').value;
            var errDiv = document.getElementById('regError');
            var sucDiv = document.getElementById('regSuccess');
            errDiv.style.display = 'none';
            sucDiv.style.display = 'none';

            if(!nick){ errDiv.textContent='Введите никнейм!'; errDiv.style.display='block'; return; }
            if(nick.length<2){ errDiv.textContent='Никнейм от 2 символов!'; errDiv.style.display='block'; return; }
            if(nick===ADMIN_NICK){ errDiv.textContent='Ник зарезервирован!'; errDiv.style.display='block'; return; }
            if(accounts[nick]){ errDiv.textContent='Никнейм занят!'; errDiv.style.display='block'; return; }
            var digits = (pass.match(/\d/g) || []).length;
            if(digits<5){ errDiv.textContent='Минимум 5 цифр в пароле!'; errDiv.style.display='block'; return; }
            if(pass!==pass2){ errDiv.textContent='Пароли не совпадают!'; errDiv.style.display='block'; return; }

            accounts[nick] = {password: pass, avatar: currentAvatar};
            saveAccounts();
            balances[nick] = 500;
            saveBalances();
            sucDiv.textContent = 'Аккаунт создан!';
            sucDiv.style.display = 'block';
            document.getElementById('regNickname').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regPasswordConfirm').value = '';
            setTimeout(function(){ showLogin(); document.getElementById('loginNickname').value = nick; }, 1000);
        }

        // ========== ВХОД ==========
        function login() {
            var nick = document.getElementById('loginNickname').value.trim();
            var pass = document.getElementById('loginPassword').value;
            var errDiv = document.getElementById('loginError');
            errDiv.style.display = 'none';

            if(!nick){ errDiv.textContent='Введите никнейм!'; errDiv.style.display='block'; return; }
            if(nick===ADMIN_NICK && pass===ADMIN_PASS){
                currentUser = ADMIN_NICK; currentAvatar = '👑'; isAdmin = true;
            } else if(accounts[nick] && accounts[nick].password===pass){
                currentUser = nick; currentAvatar = accounts[nick].avatar || '😎'; isAdmin = false;
            } else {
                errDiv.textContent='Неверный ник или пароль!'; errDiv.style.display='block'; return;
            }
            localStorage.setItem('nickname', currentUser);
            localStorage.setItem('password', pass);
            if(!balances[currentUser]){ balances[currentUser] = isAdmin ? Infinity : 500; saveBalances(); }
            showMain();
            notify('Вход выполнен!');
        }

        function logout() {
            localStorage.removeItem('nickname');
            localStorage.removeItem('password');
            currentUser = null; isAdmin = false;
            showLogin();
        }

        // ========== СООБЩЕНИЯ ==========
        async function sendMessage() {
            var input = document.getElementById('messageInput');
            var text = input.value.trim();
            if(!text) return;
            var result = await supabase.from('messages').insert([{
                nickname: currentUser,
                avatar: currentAvatar,
                text: text,
                is_admin: isAdmin
            }]);
            if(result.error) console.error(result.error);
            input.value = '';
            input.focus();
        }

        function displayMessage(msg) {
            var container = document.getElementById('messagesContainer');
            if(document.querySelector('[data-id="'+msg.id+'"]')) return;
            var isSent = msg.nickname === currentUser;
            var div = document.createElement('div');
            div.className = 'message ' + (isSent ? 'sent' : 'received');
            div.setAttribute('data-id', msg.id);
            var time = new Date(msg.created_at).toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
            div.innerHTML = '<div class="sender">'+msg.nickname+'</div>'+msg.text+'<div class="time">'+time+'</div>';
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function loadMessages() {
            document.getElementById('messagesContainer').innerHTML = '';
            var result = await supabase.from('messages').select('*').order('created_at', {ascending: true}).limit(100);
            if(result.data) result.data.forEach(function(m){ displayMessage(m); });
        }

        function setupRealtime() {
            supabase.channel('public:messages')
                .on('postgres_changes', {event:'INSERT', schema:'public', table:'messages'}, function(payload){
                    displayMessage(payload.new);
                })
                .subscribe();
        }

        // ========== ПЕРЕВОДЫ ==========
        function makeTransfer() {
            var rec = document.getElementById('transferRecipient').value.trim();
            var amt = parseInt(document.getElementById('transferAmount').value);
            var errDiv = document.getElementById('transferError');
            var sucDiv = document.getElementById('transferSuccess');
            errDiv.style.display = 'none'; sucDiv.style.display = 'none';

            if(!rec){ errDiv.textContent='Введите никнейм!'; errDiv.style.display='block'; return; }
            if(rec===currentUser){ errDiv.textContent='Нельзя себе!'; errDiv.style.display='block'; return; }
            if(!amt||amt<=0){ errDiv.textContent='Некорректная сумма!'; errDiv.style.display='block'; return; }
            if(!isAdmin && amt>balances[currentUser]){ errDiv.textContent='Недостаточно средств!'; errDiv.style.display='block'; return; }

            if(!isAdmin) balances[currentUser] -= amt;
            balances[rec] = (balances[rec] || 0) + amt;
            saveBalances();
            sucDiv.textContent = 'Отправлено '+amt+'⭐ для '+rec;
            sucDiv.style.display = 'block';
            document.getElementById('transferRecipient').value = '';
            document.getElementById('transferAmount').value = '';
            updateBalance();
            notify('Перевод '+amt+'⭐ отправлен!');
            setTimeout(function(){ sucDiv.style.display = 'none'; }, 3000);
        }

        function updateBalance() {
            var bal = balances[currentUser] || 0;
            document.getElementById('balanceDisplay').textContent = isAdmin ? '♾️ ⭐' : bal + ' ⭐';
        }

        // ========== АДМИН ==========
        function resetBalances() {
            if(!isAdmin) return;
            for(var u in balances){ if(u!==ADMIN_NICK) balances[u]=500; }
            saveBalances(); updateBalance(); notify('Балансы сброшены!');
        }
        function announce() {
            if(!isAdmin) return;
            var a = prompt('Объявление:');
            if(a) supabase.from('messages').insert([{nickname:'📢 Система', avatar:'📢', text:a, is_admin:true}]);
        }
        function giveBonus() {
            if(!isAdmin) return;
            for(var u in balances){ if(u!==ADMIN_NICK) balances[u]+=100; }
            saveBalances(); updateBalance(); notify('Бонус 100⭐ всем!');
        }

        // ========== УВЕДОМЛЕНИЯ ==========
        function notify(text) {
            var n = document.createElement('div');
            n.className = 'notification';
            n.textContent = text;
            document.body.appendChild(n);
            setTimeout(function(){ n.remove(); }, 3000);
        }

        // ========== СОХРАНЕНИЕ ==========
        function saveAccounts(){ localStorage.setItem('accounts', JSON.stringify(accounts)); }
        function saveBalances(){ localStorage.setItem('balances', JSON.stringify(balances)); }

        // ========== ЗАПУСК ==========
        window.onload = function() {
            // Загружаем данные
            var savedAccounts = localStorage.getItem('accounts');
            accounts = savedAccounts ? JSON.parse(savedAccounts) : {};
            if(!accounts[ADMIN_NICK]){ accounts[ADMIN_NICK]={password:ADMIN_PASS, avatar:'👑'}; saveAccounts(); }

            var savedBalances = localStorage.getItem('balances');
            balances = savedBalances ? JSON.parse(savedBalances) : {};

            // Выбор аватара
            document.querySelectorAll('#avatarSel .ava').forEach(function(el){
                el.addEventListener('click', function(){
                    document.querySelectorAll('#avatarSel .ava').forEach(function(a){ a.classList.remove('selected'); a.style.border='none'; });
                    this.classList.add('selected');
                    this.style.border = '3px solid #667eea';
                    this.style.borderRadius = '10px';
                    currentAvatar = this.dataset.avatar;
                });
            });

            // Автовход
            var nn = localStorage.getItem('nickname');
            var pp = localStorage.getItem('password');
            if(nn && pp && accounts[nn] && accounts[nn].password===pp){
                currentUser = nn;
                currentAvatar = accounts[nn].avatar || '😎';
                isAdmin = (nn === ADMIN_NICK);
                showMain();
            }
        };
    </script>
</body>
</html>
